services:
  web:
    restart: unless-stopped
    image: $${ECR_URL}/mp-web:$${IMAGE_TAG}
    ports:
      - 80:80
    volumes:
      - django_static:/app/django_static
      - media:/app/media
    depends_on:
      - api
    networks:
      - prowess_network
    env_file:
      - .fe.env

  api:
    restart: unless-stopped
    image: $${ECR_URL}/mp-api:$${IMAGE_TAG}
    volumes:
      - django_static:/app/django_static
      - media:/app/media
    networks:
      - prowess_network
    environment:
      POSTGRES_DB: prowessdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_HOST: $${POSTGRES_HOST} 
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: "app-alb-1194072423.ap-northeast-1.elb.amazonaws.com,mathprowess.com"

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml

volumes:
  django_static:
  media:

networks:
  prowess_network:
