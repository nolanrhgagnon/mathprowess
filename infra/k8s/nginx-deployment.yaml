apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: 638389535083.dkr.ecr.ap-northeast-1.amazonaws.com/mp-web:7e0c313cfef6e7ec4b6c8f8cf0fbc05dcca18c17
          ports:
          - containerPort: 80
